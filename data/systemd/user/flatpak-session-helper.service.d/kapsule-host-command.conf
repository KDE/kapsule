#
# Drop-in for flatpak-session-helper.service to enable Kapsule integration.
#
# When FLATPAK_HOST_COMMAND_WRAPPER is set, the patched session-helper
# prepends the wrapper path before every HostCommand argv, allowing
# Kapsule to route commands into the appropriate container.

[Service]
Environment=FLATPAK_HOST_COMMAND_WRAPPER=/usr/lib/kapsule/kapsule-flatpak-wrapper
