# Global mkosi settings shared by all Kapsule images.
# Each image under mkosi.images/ inherits these defaults.

[Distribution]
Distribution=arch
Mirror=https://geo.mirror.pkgbuild.com

[Output]
Format=directory
OutputDirectory=%D/mkosi.output

[Build]
# Allow network access during build for package downloads
WithNetwork=yes
