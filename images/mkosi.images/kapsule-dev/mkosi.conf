# Kapsule development image. Inherits the archlinux base and adds build
# toolchain, KDE Frameworks, and Python development tools on top.

[Config]
# Inherit the fully-built archlinux base image as our starting rootfs.
# This eliminates duplication of base packages, mirror config, and post-setup.
Dependencies=archlinux

[Output]
Format=directory

[Content]
# Use the archlinux image output as our base rootfs, inheriting all base
# packages and configuration.
BaseTrees=%O/archlinux

# Copy the kapsule source tree into the image for building.
# Path is relative to this config file (images/mkosi.images/kapsule-dev/).
ExtraTrees=../../../:/opt/kapsule-src

Packages=
        # Build toolchain
        base-devel
        cmake
        ninja
        git
        incus
        btrfs-progs
        python
        python-pip
        # Qt6 / KDE Frameworks / QCoro (C++ build dependencies)
        extra-cmake-modules
        qt6-base
        kcoreaddons
        ki18n
        kconfig
        qcoro
        kio
        kcmutils
        # Python runtime dependencies
        python-httpx
        python-dbus-fast
        python-typer
        python-rich
        python-yaml
        python-pydantic
        dbus-python
        python-setproctitle
        # Python development tools
        python-pytest
        python-pytest-asyncio
        python-pytest-cov
        python-black
        ruff
        mypy
