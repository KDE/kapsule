# Kapsule systemd-sysext image. Builds kapsule from source and packages it
# as a raw sysext image that can be deployed to KDE Linux via importctl.
#
# Build:  sudo mkosi --directory=sysext build
# Deploy: sudo kapsule-install-branch [branch]

[Config]
Dependencies=base

[Distribution]
Distribution=arch
Mirror=https://geo.mirror.pkgbuild.com

[Output]
Format=sysext
Output=kapsule
ImageId=kapsule
OutputDirectory=%D/mkosi.output

[Build]
WithNetwork=yes
BuildSources=..:kapsule
BuildSourcesEphemeral=yes

[Content]
BaseTrees=%O/base
Overlay=yes
